<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CoolWordle</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div style="width:40px"></div>
    <h1>CoolWordle</h1>
    <button id="stats-btn" title="Statistics">📊</button>
  </header>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- BOARD -->
  <div id="board"></div>

  <!-- KEYBOARD -->
  <div id="keyboard">
    <div class="kb-row" id="kb-row-0"></div>
    <div class="kb-row" id="kb-row-1"></div>
    <div class="kb-row" id="kb-row-2"></div>
  </div>

  <!-- RESULT MODAL -->
  <div class="overlay" id="result-overlay">
    <div class="modal">
      <button class="modal-close" id="result-close">✕</button>
      <h2 id="result-title"></h2>
      <p id="result-answer"></p>
      <div class="modal-buttons">
        <button id="see-stats-btn">📊 Stats</button>
        <button id="next-game-btn">▶ Next Game</button>
      </div>
    </div>
  </div>

  <!-- STATS MODAL -->
  <div class="overlay" id="stats-overlay">
    <div class="modal" id="stats-modal">
      <button class="modal-close" id="stats-close">✕</button>
      <h2>Statistics</h2>
      <div class="stats-grid">
        <div class="stat"><span class="stat-num" id="s-played">0</span><span class="stat-lbl">Played</span></div>
        <div class="stat"><span class="stat-num" id="s-winrate">0</span><span class="stat-lbl">Win %</span></div>
        <div class="stat"><span class="stat-num" id="s-streak">0</span><span class="stat-lbl">Current Streak</span></div>
        <div class="stat"><span class="stat-num" id="s-maxstreak">0</span><span class="stat-lbl">Max Streak</span></div>
      </div>
      <p class="dist-title">Guess Distribution</p>
      <div id="distribution"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
